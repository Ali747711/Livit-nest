services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3005:3005'
    environment:
      DB_URI: mongodb://mongo:27017/graphQL-learning
      PORT: 3005
      SECRET_TOKEN: thisismyhissupeertokendone
    depends_on:
      - mongo

volumes:
  mongo_data:
